name: Daily Telegram Summary

# 每天台北 23:38 把當日剪輯動態推到 Telegram。
# 23:38 Asia/Taipei = 15:38 UTC
# 避開整 5/10 分鐘的 GitHub Actions schedule 高峰（會延後幾十分鐘到數小時）。
# 04-28 加進來後，GitHub Actions 連兩天沒 register schedule（手動 dispatch 才會跑），
# 改 cron 強制重新註冊；原本是 :47。
on:
  schedule:
    - cron: '38 15 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '指定台北日期 YYYY-MM-DD（空白則用今天）。過午夜補跑時用來抓昨天'
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily summary
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUMMARY_DATE: ${{ inputs.date }}
        run: python scripts/daily-summary.py
