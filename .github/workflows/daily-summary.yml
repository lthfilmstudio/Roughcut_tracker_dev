name: Daily Telegram Summary

# 每天台北 23:38 把「跟上次推播比有變動」的內容推到 Telegram。
# 23:38 Asia/Taipei = 15:38 UTC
# 避開整 5/10 分鐘的 GitHub Actions schedule 高峰（會延後幾十分鐘到數小時）。
#
# 新版邏輯：跟 Supabase summary_state 表存的「上次推播快照」比 diff，
# 不再依賴執行當下的時鐘日期。即使 cron 跨午夜延遲也不會算錯。
on:
  schedule:
    - cron: '38 15 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily summary
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily-summary.py
